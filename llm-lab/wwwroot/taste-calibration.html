<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MovieDb Taste Calibration Survey</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101114;
      --panel: #181b20;
      --panel-2: #20242b;
      --text: #f1f3f6;
      --muted: #a7afbd;
      --line: #303642;
      --accent: #70d6a3;
      --accent-2: #8ab4ff;
      --danger: #ff8f8f;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.45; }
    main { width: min(1120px, calc(100vw - 32px)); margin: 0 auto; padding: 28px 0 52px; }
    header { display: grid; gap: 10px; padding-bottom: 20px; border-bottom: 1px solid var(--line); margin-bottom: 20px; }
    h1 { font-size: clamp(28px, 5vw, 46px); line-height: 1; margin: 0; letter-spacing: 0; }
    p { margin: 0; color: var(--muted); }
    .bar { position: sticky; top: 0; z-index: 2; display: flex; align-items: center; gap: 12px; background: rgba(16, 17, 20, 0.96); border-bottom: 1px solid var(--line); padding: 12px 0; margin-bottom: 18px; }
    progress { width: 100%; height: 12px; accent-color: var(--accent); }
    .count { min-width: 92px; text-align: right; color: var(--muted); font-size: 14px; }
    section { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 18px; margin: 16px 0; }
    .section-title { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; margin-bottom: 14px; }
    h2 { margin: 0; font-size: 22px; letter-spacing: 0; }
    .tag { color: var(--accent-2); font-size: 13px; white-space: nowrap; }
    .question { padding: 16px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; margin: 12px 0; }
    .question h3 { margin: 0 0 12px; font-size: 17px; letter-spacing: 0; }
    .choices { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
    .genre-grid { display: grid; gap: 12px; }
    .genre-row { display: grid; grid-template-columns: minmax(120px, 190px) 1fr; gap: 12px; align-items: center; padding: 10px; border: 1px solid var(--line); border-radius: 8px; background: #171a1f; }
    .genre-row strong { font-size: 15px; }
    label.choice { display: flex; gap: 8px; align-items: flex-start; min-height: 44px; padding: 10px; border: 1px solid var(--line); border-radius: 8px; background: #15181d; cursor: pointer; }
    label.choice:hover { border-color: #526071; }
    input { margin-top: 3px; }
    textarea { width: 100%; min-height: 86px; margin-top: 12px; resize: vertical; border-radius: 8px; border: 1px solid var(--line); background: #111318; color: var(--text); padding: 10px; font: inherit; }
    .actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 20px; }
    button { border: 0; border-radius: 8px; padding: 12px 18px; background: var(--accent); color: #06120c; font-weight: 700; cursor: pointer; }
    button.secondary { background: #303642; color: var(--text); }
    .status { color: var(--muted); min-height: 24px; }
    .error { color: var(--danger); }
    .ok { color: var(--accent); }
    @media (max-width: 720px) { .genre-row { grid-template-columns: 1fr; } .section-title { display: grid; } .tag { white-space: normal; } }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>MovieDb Taste Calibration Survey</h1>
      <p>Quick lab survey. Questions and choices are structured so the recommendation engine can turn answers into taste priors.</p>
    </header>
    <div class="bar">
      <progress id="progress" value="0" max="1"></progress>
      <div class="count" id="count">0 / 0</div>
    </div>
    <form id="surveyForm"></form>
    <section>
      <div class="section-title">
        <h2>Optional Notes</h2>
        <span class="tag">not used for scoring yet</span>
      </div>
      <textarea id="notes" placeholder="Optional: add any movie examples, edge cases, or corrections."></textarea>
      <div class="actions">
        <button type="button" id="submitButton">Save Report</button>
        <button type="button" class="secondary" id="downloadTextButton">Download text file</button>
        <button type="button" class="secondary" id="downloadButton">Download JSON</button>
        <span class="status" id="status"></span>
      </div>
    </section>
  </main>
  <script src="taste-calibration.js"></script>
</body>
</html>
