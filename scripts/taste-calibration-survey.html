<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MovieDb Taste Calibration Survey</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101114;
      --panel: #181b20;
      --panel-2: #20242b;
      --text: #f1f3f6;
      --muted: #a7afbd;
      --line: #303642;
      --accent: #70d6a3;
      --accent-2: #8ab4ff;
      --danger: #ff8f8f;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }

    main {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 52px;
    }

    header {
      display: grid;
      gap: 10px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 20px;
    }

    h1 {
      font-size: clamp(28px, 5vw, 46px);
      line-height: 1;
      margin: 0;
      letter-spacing: 0;
    }

    p { margin: 0; color: var(--muted); }

    .bar {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(16, 17, 20, 0.96);
      border-bottom: 1px solid var(--line);
      padding: 12px 0;
      margin-bottom: 18px;
      backdrop-filter: blur(12px);
    }

    progress {
      width: 100%;
      height: 12px;
      accent-color: var(--accent);
    }

    .count {
      min-width: 92px;
      text-align: right;
      color: var(--muted);
      font-size: 14px;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin: 16px 0;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 14px;
    }

    h2 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }

    .tag {
      color: var(--accent-2);
      font-size: 13px;
      white-space: nowrap;
    }

    .question {
      padding: 16px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      margin: 12px 0;
    }

    .question h3 {
      margin: 0 0 12px;
      font-size: 17px;
      letter-spacing: 0;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
    }

    .genre-grid {
      display: grid;
      gap: 12px;
    }

    .genre-row {
      display: grid;
      grid-template-columns: minmax(120px, 190px) 1fr;
      gap: 12px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #171a1f;
    }

    .genre-row strong { font-size: 15px; }

    label.choice {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      min-height: 44px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #15181d;
      cursor: pointer;
    }

    label.choice:hover { border-color: #526071; }
    input { margin-top: 3px; }

    textarea {
      width: 100%;
      min-height: 86px;
      margin-top: 12px;
      resize: vertical;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #111318;
      color: var(--text);
      padding: 10px;
      font: inherit;
    }

    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 12px 18px;
      background: var(--accent);
      color: #06120c;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: #303642;
      color: var(--text);
    }

    .status {
      color: var(--muted);
      min-height: 24px;
    }

    .error { color: var(--danger); }
    .ok { color: var(--accent); }

    @media (max-width: 720px) {
      .genre-row { grid-template-columns: 1fr; }
      .section-title { display: grid; }
      .tag { white-space: normal; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>MovieDb Taste Calibration Survey</h1>
      <p>Quick lab survey. Questions and choices are structured so the recommendation engine can turn answers into taste priors.</p>
    </header>

    <div class="bar">
      <progress id="progress" value="0" max="1"></progress>
      <div class="count" id="count">0 / 0</div>
    </div>

    <form id="surveyForm"></form>

    <section>
      <div class="section-title">
        <h2>Optional Notes</h2>
        <span class="tag">not used for scoring yet</span>
      </div>
      <textarea id="notes" placeholder="Optional: add any movie examples, edge cases, or corrections."></textarea>
      <div class="actions">
        <button type="button" id="submitButton">Save to MovieDb logs</button>
        <button type="button" class="secondary" id="downloadTextButton">Download text file</button>
        <button type="button" class="secondary" id="downloadButton">Download JSON</button>
        <span class="status" id="status"></span>
      </div>
    </section>
  </main>

  <script>
    const genres = [
      "Horror", "Comedy", "Drama", "Sci-Fi", "Action/Adventure", "Animation/Anime",
      "Mystery/Thriller", "Romance", "Documentary", "Fantasy", "Crime", "War",
      "Western", "Musical", "Foreign/International", "Older Films", "Arthouse/Experimental"
    ];

    const genreChoices = [
      { label: "Love it", signals: ["genre:{genre}=+2.0", "route:deep_module", "confidence:strong"] },
      { label: "Usually like it", signals: ["genre:{genre}=+1.0", "route:short_module", "confidence:medium"] },
      { label: "Mixed / depends", signals: ["genre:{genre}=0", "route:weak_spot_only", "confidence:light"] },
      { label: "Usually avoid it", signals: ["genre:{genre}=-1.5", "route:avoidance_probe", "confidence:medium"] },
      { label: "Almost never", signals: ["genre:{genre}=-2.5", "route:no_deep_module", "confidence:strong"] }
    ];

    const sections = [
      {
        title: "Genre Calibration",
        tag: "core",
        questions: [
          {
            id: "GENRE_002",
            target: "careful genres",
            multi: true,
            question: "Pick up to five genres where the recommendation system should be especially careful.",
            choices: genres.map(g => ({ label: g, signals: [`careful_genre:${g}=true`] }))
          }
        ]
      },
      {
        title: "Global Taste",
        tag: "core",
        questions: [
          {
            id: "GLOBAL_001",
            target: "pacing/payoff",
            question: "When a movie is slow, what usually makes it worth it for you?",
            choices: [
              ["A strong emotional payoff", "boost:emotional-payoff +2", "condition:slow+payoff->boost", "confidence:strong"],
              ["A great ending or reveal", "boost:strong-ending +2", "boost:twist +1"],
              ["A unique mood or atmosphere", "boost:atmosphere +1.5", "boost:slow-burn +0.5"],
              ["Beautiful filmmaking even without much plot", "boost:formal-style +1.5", "boost:arthouse +0.5"],
              ["Slow movies usually lose me", "penalize:slow-burn -2", "penalize:low-plot -1.5"]
            ]
          },
          {
            id: "GLOBAL_002",
            target: "payoff",
            question: "How much do you need a movie to pay off its setup?",
            choices: [
              ["I need a clear payoff", "boost:payoff +2", "penalize:no-payoff -2.5"],
              ["I like ambiguity if the emotional payoff is strong", "boost:emotional-payoff +2", "condition:ambiguity+emotional-payoff->boost"],
              ["I enjoy ambiguity and unresolved endings", "boost:ambiguity +2", "boost:opaque-ending +1"],
              ["It depends on the genre", "condition:genre-specific-payoff true", "confidence:light"]
            ]
          },
          {
            id: "GLOBAL_003",
            target: "intensity",
            question: "What kind of intensity works best for you?",
            choices: [
              ["High tension with plot momentum", "boost:intense +2", "boost:plot-momentum +2"],
              ["Emotional intensity", "boost:emotional-intensity +2"],
              ["Creeping dread and quiet unease", "boost:quiet-dread +2"],
              ["I prefer restraint over intensity", "penalize:intense -1", "boost:restrained +1"]
            ]
          },
          {
            id: "GLOBAL_004",
            target: "story/form",
            question: "If a movie has a thin story, what can save it?",
            choices: [
              ["Nothing; I need story", "penalize:thin-story -2.5", "boost:strong-story +2"],
              ["Original concept", "boost:original-idea +2", "condition:thin-story+original-idea->neutral"],
              ["Visual style", "boost:visual-style +2"],
              ["Mood and atmosphere", "boost:atmosphere +1.5"],
              ["Performance and dialogue", "boost:acting +1.5", "boost:dialogue +1"]
            ]
          },
          {
            id: "GLOBAL_005",
            target: "tone mismatch",
            question: "Which tone mismatch bothers you most?",
            choices: [
              ["A serious movie that becomes silly", "penalize:serious-to-silly -2"],
              ["A fun movie that becomes too serious", "penalize:fun-to-bleak -1.5"],
              ["A scary movie that becomes goofy", "penalize:horror-comedy-mismatch -2"],
              ["A dramatic movie that becomes manipulative", "penalize:manipulative-drama -2"],
              ["Tone shifts are fine if they are intentional", "boost:tonal-risk +1"]
            ]
          },
          {
            id: "GLOBAL_006",
            target: "romance",
            question: "How do you usually feel about romance in movies?",
            choices: [
              ["I like romance as the main story", "boost:romance-main +2"],
              ["I like romance as a subplot", "boost:romance-subplot +1.5", "penalize:romance-main -0.5"],
              ["Only if it is unusual or emotionally serious", "condition:romance+serious->boost", "penalize:generic-romance -1.5"],
              ["Romance usually lowers my interest", "penalize:romance-main -2", "penalize:romance-comedy -2"]
            ]
          }
        ]
      },
      {
        title: "Horror",
        tag: "favorite genre weak spots",
        questions: [
          {
            id: "HORROR_001",
            target: "intense vs quiet dread",
            question: "When a horror movie is slow, quiet, and atmospheric, what makes it work for you?",
            choices: [
              ["A strong ending or payoff", "condition:horror+quiet-dread+strong-ending->boost +2", "penalize:quiet-dread+no-payoff -2.5"],
              ["Sustained dread is enough", "boost:quiet-dread +2", "boost:slow-horror +1"],
              ["A fresh original idea", "boost:original-horror +2"],
              ["It usually does not work for me", "penalize:quiet-dread -2.5", "penalize:slow-horror -2"],
              ["Only if it stays scary, not just vague", "condition:quiet-dread+clear-threat->boost", "penalize:opaque-horror -2"]
            ]
          },
          {
            id: "HORROR_002",
            target: "payoff/arthouse",
            question: "How do you feel about art-house or opaque horror?",
            choices: [
              ["I love it", "boost:arthouse-horror +2", "boost:opaque-horror +1.5"],
              ["I like it if there is emotional payoff", "condition:arthouse-horror+emotional-payoff->boost", "penalize:arthouse-horror+no-payoff -1.5"],
              ["I like the mood but often feel disappointed", "boost:atmosphere +1", "penalize:no-payoff -2"],
              ["I usually dislike it", "penalize:arthouse-horror -2.5", "penalize:opaque-horror -2"]
            ]
          },
          {
            id: "HORROR_003",
            target: "found footage/shaky camera",
            question: "How do found footage and shaky camera horror usually land for you?",
            choices: [
              ["I like the realism", "boost:found-footage +2"],
              ["Only if the story is strong", "condition:found-footage+strong-story->boost", "penalize:found-footage+thin-story -2"],
              ["Shaky camera annoys me", "penalize:shaky-camera -2.5"],
              ["I usually avoid it", "penalize:found-footage -2"]
            ]
          },
          {
            id: "HORROR_004",
            target: "ingredients",
            multi: true,
            question: "Which horror ingredients are positives for you?",
            choices: [
              ["Intense dread and threat", "boost:intense-horror +2"],
              ["Supernatural mythology", "boost:supernatural +1.5"],
              ["Psychological unease", "boost:psychological-horror +1.5"],
              ["Gore and body horror", "boost:gore +1.5", "boost:body-horror +1.5"],
              ["Jump scares", "boost:jump-scares +1"],
              ["Horror comedy", "boost:horror-comedy +1.5"]
            ]
          },
          {
            id: "HORROR_005",
            target: "weak spots",
            multi: true,
            question: "Which horror pattern usually disappoints you?",
            choices: [
              ["Quiet mood without payoff", "penalize:quiet-dread+no-payoff -3"],
              ["Too much shaky camera", "penalize:shaky-camera -2.5"],
              ["Too slow without plot", "penalize:slow-horror+thin-story -2.5"],
              ["Too silly or comedic", "penalize:horror-comedy -2"],
              ["Too much gore without tension", "penalize:gore+low-tension -2"]
            ]
          }
        ]
      },
      {
        title: "Comedy",
        tag: "module",
        questions: [
          {
            id: "COMEDY_001",
            target: "comedy subtypes",
            multi: true,
            question: "Which kind of comedy works best for you?",
            choices: [
              ["Action comedy", "boost:action-comedy +2"],
              ["Absurd or weird comedy", "boost:absurd-comedy +2", "boost:weird +1"],
              ["Dark comedy", "boost:dark-comedy +2"],
              ["Cringe comedy", "boost:cringe-comedy +1.5"],
              ["Romantic comedy", "boost:romance-comedy +2"]
            ]
          },
          {
            id: "COMEDY_002",
            target: "comedy weak spots",
            multi: true,
            question: "Which comedy style usually misses for you?",
            choices: [
              ["Romantic comedy", "penalize:romance-comedy -2.5"],
              ["Cringe comedy", "penalize:cringe-comedy -2"],
              ["Broad silly comedy", "penalize:broad-comedy -2"],
              ["Random absurd comedy", "penalize:absurd-comedy -1.5"],
              ["Comedy that stops the plot", "penalize:low-plot-comedy -2"]
            ]
          }
        ]
      },
      {
        title: "Drama",
        tag: "module",
        questions: [
          {
            id: "DRAMA_001",
            target: "slow drama/payoff",
            question: "When a drama is slow, what do you need from it?",
            choices: [
              ["Emotional payoff", "boost:emotional-payoff +2", "condition:slow-drama+emotional-payoff->boost"],
              ["Great acting and dialogue", "boost:acting +2", "boost:dialogue +1.5"],
              ["A clear story arc", "boost:story-arc +2", "penalize:plotless-drama -2"],
              ["Mood and realism are enough", "boost:realism +1.5", "boost:slow-drama +1"],
              ["Slow drama usually loses me", "penalize:slow-drama -2.5"]
            ]
          },
          {
            id: "DRAMA_002",
            target: "bleakness/ambiguity",
            question: "How much bleakness can a drama have before it becomes a problem?",
            choices: [
              ["Bleak is fine if it feels meaningful", "condition:bleak+meaningful->boost", "boost:serious +1"],
              ["I need some hope or catharsis", "boost:catharsis +2", "penalize:bleak+no-catharsis -2"],
              ["I like uncompromising bleak movies", "boost:bleak +2"],
              ["I usually avoid bleak drama", "penalize:bleak -2.5"]
            ]
          }
        ]
      },
      {
        title: "Sci-Fi",
        tag: "module",
        questions: [
          {
            id: "SCIFI_001",
            target: "sci-fi subtype",
            multi: true,
            question: "What kind of sci-fi are you most excited by?",
            choices: [
              ["Big ideas and original concepts", "boost:idea-driven-scifi +2", "boost:original-idea +1.5"],
              ["Action sci-fi", "boost:action-scifi +2"],
              ["Puzzle, mystery, or twist sci-fi", "boost:puzzle-scifi +2", "boost:twist +1.5"],
              ["Philosophical slow sci-fi", "boost:philosophical-scifi +2", "boost:slow-scifi +1"],
              ["Alien worlds and world-building", "boost:world-building +2"]
            ]
          },
          {
            id: "SCIFI_002",
            target: "sci-fi weak spots",
            multi: true,
            question: "Which sci-fi problem bothers you most?",
            choices: [
              ["Great concept, weak story", "penalize:concept-with-weak-story -2"],
              ["Too slow and philosophical", "penalize:slow-scifi -2"],
              ["Empty CGI spectacle", "penalize:empty-cgi -2.5"],
              ["Too much exposition", "penalize:exposition-heavy -1.5"],
              ["Predictable twist", "penalize:predictable-twist -2"]
            ]
          }
        ]
      },
      {
        title: "Action / Adventure",
        tag: "module",
        questions: [
          {
            id: "ACTION_001",
            target: "spectacle/stakes",
            multi: true,
            question: "What makes action or adventure work for you?",
            choices: [
              ["Kinetic practical action", "boost:kinetic-action +2", "boost:practical-stunts +1.5"],
              ["Emotional stakes", "boost:emotional-stakes +2"],
              ["Martial arts or fight choreography", "boost:martial-arts +2"],
              ["Large-scale spectacle", "boost:spectacle +1.5"],
              ["Fun adventure momentum", "boost:adventure-momentum +2"]
            ]
          },
          {
            id: "ACTION_002",
            target: "weak spots",
            multi: true,
            question: "Which action/adventure pattern lowers your interest?",
            choices: [
              ["Empty CGI spectacle", "penalize:empty-cgi -2.5"],
              ["No emotional stakes", "penalize:no-stakes -2"],
              ["Generic superhero formula", "penalize:superhero-fatigue -2.5"],
              ["Too much quippy comedy", "penalize:quippy-action -1.5"],
              ["Messy editing", "penalize:messy-action -2"]
            ]
          }
        ]
      },
      {
        title: "Animation / Anime",
        tag: "module",
        questions: [
          {
            id: "ANIMATION_001",
            target: "animation taste",
            multi: true,
            question: "What makes animation or anime appealing to you?",
            choices: [
              ["Adult themes", "boost:adult-animation +2"],
              ["Visual imagination", "boost:visual-style +2", "boost:animation-craft +1.5"],
              ["Weird or surreal ideas", "boost:weird-animation +2"],
              ["Warm family tone", "boost:family-tone +1.5"],
              ["Action and world-building", "boost:anime-action +1.5", "boost:world-building +1.5"]
            ]
          },
          {
            id: "ANIMATION_002",
            target: "animation weak spots",
            multi: true,
            question: "What makes animation or anime less appealing to you?",
            choices: [
              ["Too childish", "penalize:childish-tone -2"],
              ["Too loud or chaotic", "penalize:chaotic-animation -1.5"],
              ["Too sentimental", "penalize:sentimental -1.5"],
              ["Too visually generic", "penalize:generic-animation -1.5"],
              ["I rarely choose animation", "penalize:animation -2"]
            ]
          }
        ]
      },
      {
        title: "Mystery / Thriller",
        tag: "module",
        questions: [
          {
            id: "THRILLER_001",
            target: "twist/procedural/pacing",
            multi: true,
            question: "What kind of mystery or thriller works best for you?",
            choices: [
              ["A great twist", "boost:twist +2"],
              ["Procedural investigation", "boost:procedural +2"],
              ["Fast pacing and tension", "boost:tension +2", "boost:plot-momentum +1.5"],
              ["Ambiguous psychological mystery", "boost:psychological-thriller +2", "boost:ambiguity +1"],
              ["Crime atmosphere", "boost:crime-atmosphere +1.5"]
            ]
          },
          {
            id: "THRILLER_002",
            target: "weak spots",
            multi: true,
            question: "What ruins a mystery or thriller fastest?",
            choices: [
              ["Predictable reveal", "penalize:predictable-twist -2.5"],
              ["Too slow", "penalize:slow-thriller -2"],
              ["No real suspense", "penalize:no-suspense -2.5"],
              ["Confusing instead of mysterious", "penalize:confusing-plot -2"],
              ["Unfair twist", "penalize:unfair-twist -2"]
            ]
          }
        ]
      },
      {
        title: "Romance / Arthouse / Foreign / Older Films",
        tag: "cross-genre",
        questions: [
          {
            id: "ROMANCE_001",
            target: "romance distinction",
            question: "When romance is present, what version works best?",
            choices: [
              ["Romance as the main emotional engine", "boost:romance-main +2"],
              ["Romance as a subplot", "boost:romance-subplot +2"],
              ["Only tragic or serious romance", "boost:serious-romance +1.5", "penalize:light-romance -1.5"],
              ["Only if it does not take over the movie", "condition:romance-subplot->boost", "penalize:romance-main -2"],
              ["I usually dislike romance-driven movies", "penalize:romance-main -2.5"]
            ]
          },
          {
            id: "ARTHOUSE_001",
            target: "pacing/formal experimentation",
            question: "How do you feel about formally experimental or art-house movies?",
            choices: [
              ["I love formal experimentation", "boost:formal-experimentation +2", "boost:arthouse +1.5"],
              ["I like it if the movie still has payoff", "condition:arthouse+payoff->boost", "penalize:arthouse+no-payoff -2"],
              ["I respect it but rarely enjoy it", "penalize:arthouse -1.5", "confidence:medium"],
              ["I usually dislike it", "penalize:arthouse -2.5", "penalize:opaque-storytelling -2"]
            ]
          },
          {
            id: "FOREIGN_001",
            target: "cultural distance/language",
            question: "How do you feel about international movies with unfamiliar cultural context?",
            choices: [
              ["That makes them more interesting", "boost:foreign +1.5", "boost:cultural-specificity +1.5"],
              ["I like them if the story is accessible", "condition:foreign+accessible-story->boost"],
              ["I need strong genre hooks", "condition:foreign+genre-hook->boost", "penalize:foreign+slow -1.5"],
              ["They are harder for me to get into", "penalize:cultural-distance -1.5"]
            ]
          },
          {
            id: "OLD_001",
            target: "older films",
            question: "How do older movies usually work for you?",
            choices: [
              ["I like classic pacing and style", "boost:older-films +2"],
              ["I like older movies if the story still moves", "condition:older-film+plot-momentum->boost", "penalize:older-film+slow -1.5"],
              ["Only major classics", "boost:canon-classic +1", "penalize:obscure-old-film -1.5"],
              ["Older pacing is usually a barrier", "penalize:older-films -2"]
            ]
          }
        ]
      }
    ];

    function normalizeChoice(raw) {
      if (Array.isArray(raw)) {
        const [label, ...signals] = raw;
        return { label, signals };
      }
      return raw;
    }

    function render() {
      const form = document.getElementById("surveyForm");
      const genreSection = document.createElement("section");
      genreSection.innerHTML = `<div class="section-title"><h2>Genre Strength</h2><span class="tag">required foundation</span></div>`;
      const grid = document.createElement("div");
      grid.className = "genre-grid";
      genres.forEach((genre) => {
        const row = document.createElement("div");
        row.className = "genre-row";
        row.innerHTML = `<strong>${genre}</strong>`;
        const choices = document.createElement("div");
        choices.className = "choices";
        genreChoices.forEach((choice) => {
          const id = `GENRE_001_${genre}_${choice.label}`.replace(/[^a-z0-9]/gi, "_");
          const label = document.createElement("label");
          label.className = "choice";
          label.innerHTML = `<input type="radio" name="GENRE_001:${genre}" id="${id}" value="${choice.label}" data-signals="${choice.signals.map(s => s.replace("{genre}", genre)).join("|")}"><span>${choice.label}</span>`;
          choices.appendChild(label);
        });
        row.appendChild(choices);
        grid.appendChild(row);
      });
      genreSection.appendChild(grid);
      form.appendChild(genreSection);

      sections.forEach((section) => {
        const el = document.createElement("section");
        el.innerHTML = `<div class="section-title"><h2>${section.title}</h2><span class="tag">${section.tag}</span></div>`;
        section.questions.forEach((question) => {
          const q = document.createElement("div");
          q.className = "question";
          q.dataset.questionId = question.id;
          q.innerHTML = `<h3>${question.question}</h3>`;
          const choices = document.createElement("div");
          choices.className = "choices";
          question.choices.map(normalizeChoice).forEach((choice) => {
            const id = `${question.id}_${choice.label}`.replace(/[^a-z0-9]/gi, "_");
            const type = question.multi ? "checkbox" : "radio";
            const label = document.createElement("label");
            label.className = "choice";
            label.innerHTML = `<input type="${type}" name="${question.id}" id="${id}" value="${choice.label}" data-signals="${choice.signals.join("|")}"><span>${choice.label}</span>`;
            choices.appendChild(label);
          });
          q.appendChild(choices);
          el.appendChild(q);
        });
        form.appendChild(el);
      });

      updateProgress();
      form.addEventListener("change", updateProgress);
    }

    function collectAnswers() {
      const answers = [];
      const genreAnswers = [];
      genres.forEach((genre) => {
        const selected = document.querySelector(`input[name="GENRE_001:${CSS.escape(genre)}"]:checked`);
        if (selected) {
          genreAnswers.push({
            genre,
            choice: selected.value,
            signals: selected.dataset.signals.split("|")
          });
        }
      });
      answers.push({
        id: "GENRE_001",
        question: "How do you usually feel about these genres?",
        target: "genre strength",
        choices: genreAnswers
      });

      document.querySelectorAll(".question").forEach((q) => {
        const id = q.dataset.questionId;
        const selected = [...q.querySelectorAll("input:checked")].map(input => ({
          choice: input.value,
          signals: input.dataset.signals.split("|")
        }));
        answers.push({
          id,
          question: q.querySelector("h3").textContent,
          target: findTarget(id),
          choices: selected
        });
      });

      return {
        survey: "taste-calibration",
        version: 1,
        submittedAt: new Date().toISOString(),
        answers,
        notes: document.getElementById("notes").value.trim()
      };
    }

    function collectTextReport() {
      const payload = collectAnswers();
      const lines = [
        "MovieDb Taste Calibration Survey",
        `Submitted: ${payload.submittedAt}`,
        "",
      ];

      payload.answers.forEach((answer) => {
        lines.push(`[${answer.id}] ${answer.question}`);
        if (answer.id === "GENRE_001") {
          answer.choices.forEach((genreAnswer) => {
            lines.push(`- ${genreAnswer.genre}: ${genreAnswer.choice}`);
            genreAnswer.signals.forEach(signal => lines.push(`  signal: ${signal}`));
          });
        } else if (answer.choices.length === 0) {
          lines.push("- no answer");
        } else {
          answer.choices.forEach((choice) => {
            lines.push(`- ${choice.choice}`);
            choice.signals.forEach(signal => lines.push(`  signal: ${signal}`));
          });
        }
        lines.push("");
      });

      if (payload.notes) {
        lines.push("Notes");
        lines.push(payload.notes);
      }

      return lines.join("\n");
    }

    function findTarget(id) {
      for (const section of sections) {
        const question = section.questions.find(q => q.id === id);
        if (question) return question.target;
      }
      return "";
    }

    function updateProgress() {
      const radioNames = new Set([...document.querySelectorAll('input[type="radio"]')].map(i => i.name));
      const checkboxGroups = new Set([...document.querySelectorAll('input[type="checkbox"]')].map(i => i.name));
      const total = radioNames.size + checkboxGroups.size;
      let done = 0;
      radioNames.forEach(name => { if (document.querySelector(`input[name="${CSS.escape(name)}"]:checked`)) done++; });
      checkboxGroups.forEach(name => { if (document.querySelector(`input[name="${CSS.escape(name)}"]:checked`)) done++; });
      document.getElementById("progress").value = total ? done / total : 0;
      document.getElementById("count").textContent = `${done} / ${total}`;
    }

    async function submitSurvey() {
      const status = document.getElementById("status");
      const payload = collectAnswers();
      status.textContent = "Saving...";
      status.className = "status";
      try {
        const response = await fetch("/save", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            ...payload,
            textReport: collectTextReport()
          }, null, 2)
        });
        if (!response.ok) throw new Error(await response.text());
        const result = await response.json();
        status.textContent = `Saved to ${result.path}`;
        status.className = "status ok";
      } catch (error) {
        status.textContent = `Save failed. Use Download JSON. ${error.message}`;
        status.className = "status error";
      }
    }

    function downloadSurvey() {
      const blob = new Blob([JSON.stringify(collectAnswers(), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "taste-calibration-survey-results.json";
      link.click();
      URL.revokeObjectURL(url);
    }

    function downloadTextSurvey() {
      const blob = new Blob([collectTextReport()], { type: "text/plain" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "taste-calibration-survey-results.txt";
      link.click();
      URL.revokeObjectURL(url);
    }

    document.getElementById("submitButton").addEventListener("click", submitSurvey);
    document.getElementById("downloadButton").addEventListener("click", downloadSurvey);
    document.getElementById("downloadTextButton").addEventListener("click", downloadTextSurvey);
    render();
  </script>
</body>
</html>
