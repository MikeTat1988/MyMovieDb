<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1280 720">
  <title id="title">MyMovieDB recommendation calibration flow</title>
  <desc id="desc">A clean flow showing movies becoming parameters, predicted score, real rating, and adjusted weights.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.55" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="76" y="80" width="1128" height="560" rx="28" fill="#f8fafc" opacity="0.96"/>

  <text x="120" y="152" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="700">MyMovieDB</text>
  <text x="120" y="196" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="22">Recommendation calibration from real personal ratings</text>

  <g font-family="Segoe UI, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(120 276)">
      <rect width="176" height="168" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
      <rect x="24" y="24" width="56" height="80" rx="7" fill="#334155"/>
      <rect x="94" y="24" width="56" height="80" rx="7" fill="#14b8a6"/>
      <circle cx="52" cy="124" r="10" fill="#f59e0b"/>
      <circle cx="94" cy="124" r="10" fill="#f59e0b"/>
      <circle cx="136" cy="124" r="10" fill="#f59e0b"/>
      <text x="88" y="148" text-anchor="middle" fill="#0f172a" font-size="19" font-weight="700">Movies</text>
    </g>

    <g transform="translate(336 276)">
      <rect width="176" height="168" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
      <rect x="28" y="34" width="120" height="14" rx="7" fill="#0f766e"/>
      <rect x="28" y="66" width="92" height="14" rx="7" fill="#2563eb"/>
      <rect x="28" y="98" width="132" height="14" rx="7" fill="#f59e0b"/>
      <rect x="28" y="130" width="76" height="14" rx="7" fill="#64748b"/>
      <text x="88" y="148" text-anchor="middle" fill="#0f172a" font-size="19" font-weight="700">Parameters</text>
    </g>

    <g transform="translate(552 276)">
      <rect width="176" height="168" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
      <circle cx="88" cy="78" r="48" fill="#e0f2fe" stroke="#0284c7" stroke-width="8"/>
      <text x="88" y="88" text-anchor="middle" fill="#075985" font-size="31" font-weight="800">84</text>
      <text x="88" y="148" text-anchor="middle" fill="#0f172a" font-size="19" font-weight="700">Predicted score</text>
    </g>

    <g transform="translate(768 276)">
      <rect width="176" height="168" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
      <path d="M48 98 L72 122 L128 58" fill="none" stroke="#16a34a" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="88" y="148" text-anchor="middle" fill="#0f172a" font-size="19" font-weight="700">Real rating</text>
    </g>

    <g transform="translate(984 276)">
      <rect width="176" height="168" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
      <line x1="42" y1="112" x2="42" y2="52" stroke="#0f766e" stroke-width="12" stroke-linecap="round"/>
      <line x1="88" y1="112" x2="88" y2="72" stroke="#2563eb" stroke-width="12" stroke-linecap="round"/>
      <line x1="134" y1="112" x2="134" y2="38" stroke="#f59e0b" stroke-width="12" stroke-linecap="round"/>
      <circle cx="42" cy="76" r="13" fill="#0f766e"/>
      <circle cx="88" cy="92" r="13" fill="#2563eb"/>
      <circle cx="134" cy="58" r="13" fill="#f59e0b"/>
      <text x="88" y="148" text-anchor="middle" fill="#0f172a" font-size="19" font-weight="700">Adjusted weights</text>
    </g>
  </g>

  <g stroke="#94a3b8" stroke-width="4" stroke-linecap="round" fill="none">
    <path d="M304 360 H328"/>
    <path d="M520 360 H544"/>
    <path d="M736 360 H760"/>
    <path d="M952 360 H976"/>
  </g>
  <g fill="#94a3b8">
    <path d="M328 360 L316 352 V368 Z"/>
    <path d="M544 360 L532 352 V368 Z"/>
    <path d="M760 360 L748 352 V368 Z"/>
    <path d="M976 360 L964 352 V368 Z"/>
  </g>

  <path d="M1072 500 C894 586 454 586 234 462" fill="none" stroke="#0f766e" stroke-width="5" stroke-linecap="round" stroke-dasharray="12 14"/>
  <path d="M226 462 L246 460 L236 478 Z" fill="#0f766e"/>
  <text x="640" y="594" text-anchor="middle" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="21">prediction gaps feed the next calibration pass</text>
</svg>
